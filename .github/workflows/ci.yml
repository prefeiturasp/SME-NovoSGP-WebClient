name: CI/CD

on:
  push:
    branches: [ fix/pipeline-dev ]
  pull_request:
    branches: [  ]

jobs:
  docker:
    name: Docker
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Normalize branch name
      run: echo "branch=$( ${GITHUB_REF:10} | tr '/' '-' )" >> $GITHUB_ENV

    - name: Build
      run: |
        cd $GITHUB_WORKSPACE
        echo $docker_pass | docker login registry.sme.prefeitura.sp.gov.br -u $docker_user --password-stdin 
        docker build -t registry.sme.prefeitura.sp.gov.br/sgp/sme-sgp-webclient:$branch -f src/SME.SGP.WebClient/Dockerfile .
        docker push registry.sme.prefeitura.sp.gov.br/sgp/sme-sgp-webclient:$branch
      env: # https://docs.github.com/en/actions/reference/environment-variables
        docker_user: ${{ secrets.DOCKER_USER }}
        docker_pass: ${{ secrets.DOCKER_PASS }}