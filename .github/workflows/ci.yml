name: CI/CD Dev

on:
  push:
    branches: [ fix/pipeline-dev ]
  pull_request:
    branches: [ dev ]

jobs:
  docker:
    name: Docker
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Build
      run: |
        cd $GITHUB_WORKSPACE
        docker login registry.sme.prefeitura.sp.gov.br -u $docker_user -p $docker_pass
        docker build -t registry.sme.prefeitura.sp.gov.br/sgp/sme-sgp-webclient:dev -f src/SME.SGP.WebClient/Dockerfile .
        docker push registry.sme.prefeitura.sp.gov.br/sgp/sme-sgp-webclient:$branch
      env: # https://docs.github.com/en/actions/reference/environment-variables
        docker_user: ${{ secrets.DOCKER_USER }}
        docker_pass: ${{ secrets.DOCKER_PASS }}
        branch: ${GITHUB_REF:10}